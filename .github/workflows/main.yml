name: Java CI

on: [push]

concurrency:
  group: doc_generation
  cancel-in-progress: false

jobs:
  build:
    strategy:
      matrix:
        java-version: [ '21' ]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      # jdk 25 and xmlstarlet for jdbld, jdk21 and graphviz for javadoc, 
      - name: Install required packages
        run: sudo apt-get install openjdk-25-jdk xmlstarlet openjdk-21-jdk graphviz
      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v3
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'adopt'
      - name: Build with jdbld
        run: >
          JAVA_HOME=/usr/lib/jvm/java-25-openjdk-amd64/
          ./jdbld -Pjgrapes.repo.access.token=${{ secrets.REPO_ACCESS_TOKEN }}
          build test ghPagesPublication
